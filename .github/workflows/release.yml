name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  BACKEND_IMAGE: zardkim/eztag-backend
  FRONTEND_IMAGE: zardkim/eztag-frontend

jobs:
  build-and-push:
    name: Build Docker images & Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version info
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_num=${VERSION#v}" >> $GITHUB_OUTPUT

      # 멀티 아키텍처 빌드 (amd64 + arm64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Backend 이미지 빌드 & 푸시 ──────────────────────────
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Frontend 이미지 빌드 & 푸시 ─────────────────────────
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── GitHub Release 생성 ──────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: eztag ${{ steps.meta.outputs.version }}
          body: |
            ## Docker Hub 이미지

            ```
            zardkim/eztag-backend:${{ steps.meta.outputs.version }}
            zardkim/eztag-frontend:${{ steps.meta.outputs.version }}
            ```

            ## 설치 / 업데이트

            ```bash
            # 최초 설치
            curl -O https://raw.githubusercontent.com/zardkim/eztag/main/docker-compose.yml
            curl -O https://raw.githubusercontent.com/zardkim/eztag/main/env.sample
            cp env.sample .env
            # .env 수정 후:
            docker compose up -d

            # 버전 지정 설치
            VERSION=${{ steps.meta.outputs.version }} docker compose up -d

            # 업데이트
            docker compose pull && docker compose up -d
            ```

            ## 변경 사항
          generate_release_notes: true
