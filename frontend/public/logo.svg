<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 60">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Icon (60x60, scaled from 100x100) -->
  <g transform="scale(0.6)">
    <!-- Background -->
    <rect width="100" height="100" rx="22" fill="url(#bg)"/>
    <!-- Shine overlay -->
    <rect width="100" height="50" rx="22" fill="url(#shine)"/>
    <!-- Tag shape -->
    <path d="M20 26 L60 26 L80 50 L60 74 L20 74 Q15 74 15 69 L15 31 Q15 26 20 26 Z"
          fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.6)" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Tag hole -->
    <circle cx="25" cy="50" r="5.5" fill="#4338ca"/>
    <circle cx="25" cy="50" r="4" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
    <!-- Music note head -->
    <ellipse cx="52" cy="60" rx="7.5" ry="5.5" fill="white" transform="rotate(-18,52,60)"/>
    <!-- Stem -->
    <line x1="58.5" y1="57" x2="58.5" y2="30" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Flag -->
    <path d="M58.5 30 C70 34 74 42 66 50 C66 44 60 40 58.5 38 Z" fill="white"/>
  </g>

  <!-- "eztag" text -->
  <text x="72" y="38" font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="28" font-weight="800" fill="#1e1b4b" letter-spacing="-0.5">eztag</text>

  <!-- "Music Tag Manager" subtitle -->
  <text x="73" y="52" font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="9" font-weight="400" fill="#6b7280" letter-spacing="0.3">Music Tag Manager</text>
</svg>
