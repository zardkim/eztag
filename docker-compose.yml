version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: eztag
      POSTGRES_USER: eztag
      POSTGRES_PASSWORD: eztag
    volumes:
      - ./data/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eztag"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "18011:18011"
    environment:
      DATABASE_URL: postgresql://eztag:eztag@postgres:5432/eztag
      MUSIC_BASE_PATH: /music
      COVERS_PATH: /app/data/covers
      SECRET_KEY: changeme-in-production
      LOG_DIR: /app/data/logs
      LOG_LEVEL: INFO
      BACKUP_DIR: /app/data/backup
    volumes:
      - /volume1/music:/music
      - ./data/covers:/app/data/covers
      - ./data/logs:/app/data/logs
      - ./data/backup:/app/data/backup
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5850:80"
    depends_on:
      - backend
