version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: eztag
      POSTGRES_USER: eztag
      POSTGRES_PASSWORD: ${DB_PASSWORD:-eztag_password}
    volumes:
      - ./data/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eztag"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eztag-net

  backend:
    image: zardkim/eztag-backend:${VERSION:-latest}
    restart: unless-stopped
    ports:
      - "18011:18011"
    environment:
      DATABASE_URL: postgresql://eztag:${DB_PASSWORD:-eztag_password}@postgres:5432/eztag
      MUSIC_BASE_PATH: /music
      WORKSPACE_PATH: /workspace
      COVERS_PATH: /app/data/covers
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env file}
      LOG_DIR: /app/data/logs
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      BACKUP_DIR: /app/data/backup
    volumes:
      - ./data/library:/music
      - ./data/workspace:/workspace
      - ./data/covers:/app/data/covers
      - ./data/logs:/app/data/logs
      - ./data/backup:/app/data/backup
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eztag-net

  frontend:
    image: zardkim/eztag-frontend:${VERSION:-latest}
    restart: unless-stopped
    ports:
      - "5850:80"
    depends_on:
      - backend
    networks:
      - eztag-net

networks:
  eztag-net:
    driver: bridge
